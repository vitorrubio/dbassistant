name: ci

on:
  push:
    branches:
      - master
      - main
      - "feature/**"
      - "fix/**"
  pull_request:
    branches:
      - master
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore DBAssistant.sln

      - name: Build
        run: dotnet build DBAssistant.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test DBAssistant.sln --configuration Release --no-build
